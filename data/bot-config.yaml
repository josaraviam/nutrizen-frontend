      El programa de nutrición hormonal atiende:

      · Síndrome de ovario poliquístico (SOP)
      · Resistencia a la insulina
      · Hipotiroidismo
      · Endometriosis
      · Salud reproductiva
      · Menopausia y perimenopausia

      La nutrición puede mejorar significativamente los síntomas hormonales.

