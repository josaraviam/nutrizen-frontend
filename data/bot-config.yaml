      El programa de control de peso de Itzel incluye:

      · Evaluación inicial de composición corporal
      · Plan de alimentación personalizado según tus objetivos
      · Estrategias para pérdida de grasa o aumento de masa muscular
      · Nutrición deportiva si haces ejercicio
      · Educación nutricional para mantener resultados a largo plazo

