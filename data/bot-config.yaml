      El manejo nutricional de patologías metabólicas incluye:

      · Diabetes mellitus tipo 1 y 2
      · Hipertensión arterial
      · Colesterol y triglicéridos elevados
      · Hígado graso no alcohólico
      · Síndrome metabólico
      · Gastritis, colitis y síndrome de intestino irritable
      · Anemia

      El plan se coordina con el tratamiento médico que ya llevas.

