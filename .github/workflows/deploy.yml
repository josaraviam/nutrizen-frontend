name: Deploy to AWS S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Inject webhook URL
      run: |
        sed -i 's|__WEBHOOK_URL__|${{ secrets.N8N_WEBHOOK_URL }}|g' js/nutrizen-chat-widget.js

    - name: Deploy to S3
      run: |
        aws s3 sync . s3://nutrizen-prod/ \
          --exclude ".git/*" \
          --exclude ".github/*" \
          --exclude "*.md" \
          --exclude "*.sh" \
          --exclude ".DS_Store" \
          --delete
    
    - name: Configure public access
      run: |
        aws s3api put-public-access-block \
          --bucket nutrizen-prod \
          --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"
        
        cat > policy.json << 'EOF'
        {
          "Version": "2012-10-17",
          "Statement": [{
            "Sid": "PublicReadGetObject",
            "Effect": "Allow",
            "Principal": "*",
            "Action": "s3:GetObject",
            "Resource": "arn:aws:s3:::nutrizen-prod/*"
          }]
        }
        EOF
        
        aws s3api put-bucket-policy --bucket nutrizen-prod --policy file://policy.json
    
    - name: Configure static website hosting
      run: |
        aws s3 website s3://nutrizen-prod/ \
          --index-document index.html
    
    - name: Invalidate CloudFront cache
      run: |
        aws cloudfront create-invalidation \
          --distribution-id E2PJ3TAA6JKSGX \
          --paths "/*"
    
    - name: Deployment complete
      run: |
        echo "Deploy exitoso!"
        echo "URL: www.nutrizen.com.mx"